<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rastrea tu envío - Fletes Tauro</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; margin: 0; padding: 0; }
  .banda { height: 6px; background: #d92027; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 26px 16px; }

  .marca { text-align: center; margin-bottom: 22px; }
  .marca h1 { font-size: 1.7rem; margin: 0; letter-spacing: 0.06em; text-transform: uppercase; }
  .marca h1 .grupo { color: #8a8a8a; font-weight: 400; }
  .marca h1 .tauro { color: #d92027; font-weight: 800; }
  .marca p { margin: 6px 0 0; color: #6b6b6b; font-size: 0.95rem; }

  .card { background: #fff; border-radius: 4px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.10); margin-bottom: 14px; }
  .buscador { display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 13px 14px; font-size: 1.05rem; border-radius: 4px; border: 1.5px solid #cfcfcf; color: #1a1a1a; }
  input[type=text]:focus { outline: none; border-color: #d92027; }
  button { padding: 13px 24px; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 4px; border: none; background: #d92027; color: #fff; cursor: pointer; }
  button:hover { background: #b31a20; }
  button:disabled { background: #e58a8d; cursor: wait; }

  #resultado { display: none; border-top: 4px solid #d92027; }
  .estatus-grande { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; margin: 0 0 4px; }
  .e-transito { color: #d92027; }
  .e-bodega { color: #1e7d32; }
  .mensaje { margin: 0; color: #4b4b4b; }
  .actualizado { margin: 10px 0 0; font-size: 0.8rem; color: #9a9a9a; }

  .error { display: none; background: #fdecec; border: 1.5px solid #d92027; color: #a31419; border-radius: 4px; padding: 14px 16px; margin-bottom: 14px; }

  h2 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8a8a8a; margin: 0 0 12px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
  .timeline { list-style: none; margin: 0; padding: 0; }
  .timeline li { position: relative; padding: 0 0 18px 26px; border-left: 2px solid #e5e5e5; margin-left: 8px; }
  .timeline li:last-child { border-left-color: transparent; padding-bottom: 0; }
  .timeline li::before { content: ''; position: absolute; left: -8px; top: 2px; width: 14px; height: 14px; border-radius: 50%; background: #cfcfcf; }
  .timeline li.e-salida::before { background: #d92027; }
  .timeline li.e-llegada::before { background: #1e7d32; }
  .timeline .desc { font-size: 0.95rem; color: #1a1a1a; }
  .timeline .fecha { font-size: 0.78rem; color: #9a9a9a; margin-top: 2px; }

  .pie { text-align: center; font-size: 0.8rem; color: #9a9a9a; margin-top: 20px; }

  .btn-wa { position: fixed; right: 18px; bottom: 18px; width: 58px; height: 58px; border-radius: 50%; background: #25d366; box-shadow: 0 3px 10px rgba(0,0,0,0.25); display: none; align-items: center; justify-content: center; z-index: 10; }
  .btn-wa:hover { background: #1fb857; }
  .btn-wa svg { width: 32px; height: 32px; fill: #fff; }
</style>
</head>
<body>
<div class="banda"></div>
<div class="wrap">

  <div class="marca">
    <h1><span class="grupo">Fletes</span><span class="tauro">Tauro</span></h1>
    <p>Rastrea tu envío Monterrey &harr; Ciudad de México</p>
  </div>

  <div class="card">
    <div class="buscador">
      <input type="text" id="guia" placeholder="Escribe tu número de guía" autocomplete="off" autofocus />
      <button id="btnBuscar" onclick="rastrear()">Rastrear</button>
    </div>
  </div>

  <div class="error" id="error"></div>

  <div class="card" id="resultado">
    <p class="estatus-grande" id="resEstatus"></p>
    <p class="mensaje" id="resMensaje"></p>
    <p class="actualizado" id="resActualizado"></p>
  </div>

  <div class="card" id="cardHistorial" style="display:none">
    <h2>Historial del envío</h2>
    <ul class="timeline" id="historial"></ul>
  </div>

  <p class="pie">Si tienes dudas sobre tu envío, contáctanos por WhatsApp.</p>
</div>

<a class="btn-wa" id="btnWa" href="#" target="_blank" rel="noopener" title="Escríbenos por WhatsApp" aria-label="Escríbenos por WhatsApp">
  <svg viewBox="0 0 32 32"><path d="M16 2.7C8.7 2.7 2.8 8.6 2.8 15.9c0 2.3.6 4.6 1.8 6.6L2.7 29.3l7-1.8c1.9 1 4.1 1.6 6.3 1.6 7.3 0 13.2-5.9 13.2-13.2S23.3 2.7 16 2.7zm0 24.1c-2 0-3.9-.5-5.6-1.5l-.4-.2-4.2 1.1 1.1-4-.3-.4c-1.1-1.8-1.7-3.9-1.7-6 0-6.1 5-11 11.1-11s11.1 4.9 11.1 11-5 11-11.1 11zm6.1-8.2c-.3-.2-2-1-2.3-1.1-.3-.1-.5-.2-.7.2-.2.3-.8 1.1-1 1.3-.2.2-.4.2-.7.1-.3-.2-1.4-.5-2.7-1.7-1-.9-1.7-2-1.9-2.3-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.6.1-.2 0-.4 0-.6-.1-.2-.7-1.8-1-2.4-.3-.6-.5-.5-.7-.6h-.6c-.2 0-.6.1-.9.4-.3.3-1.2 1.1-1.2 2.8s1.2 3.2 1.4 3.5c.2.2 2.4 3.7 5.9 5.2.8.4 1.5.6 2 .7.8.3 1.6.2 2.2.1.7-.1 2-.8 2.3-1.6.3-.8.3-1.5.2-1.6-.1-.2-.3-.2-.6-.4z"/></svg>
</a>

<script>
  const $ = (id) => document.getElementById(id);

  // Numero de WhatsApp para dudas de clientes (formato internacional, sin
  // espacios ni signos; ej. Mexico: 5281XXXXXXXX). Si se deja vacio, el
  // boton flotante no se muestra.
  const WHATSAPP_NUMERO = '';

  function actualizarBotonWa(numeroGuia) {
    if (!WHATSAPP_NUMERO) return;
    const texto = numeroGuia
      ? `Hola, tengo una duda sobre mi envio ${numeroGuia}.`
      : 'Hola, tengo una duda sobre mi envio.';
    $('btnWa').href = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(texto)}`;
    $('btnWa').style.display = 'flex';
  }
  actualizarBotonWa(null);

  const ETIQUETAS = {
    EN_TRANSITO_A_CDMX: 'En tránsito a CDMX',
    EN_TRANSITO_A_MTY: 'En tránsito a MTY',
    EN_BODEGA_CDMX: 'En bodega CDMX',
    EN_BODEGA_MTY: 'En bodega MTY',
  };

  const DETALLES = {
    EN_TRANSITO_A_CDMX: 'Tu envío salió de bodega MTY y está en tránsito hacia CDMX.',
    EN_TRANSITO_A_MTY: 'Tu envío salió de bodega CDMX y está en tránsito hacia MTY.',
    EN_BODEGA_CDMX: 'Tu envío llegó a bodega CDMX y está listo.',
    EN_BODEGA_MTY: 'Tu envío llegó a bodega MTY y está listo.',
  };

  const EVENTOS = [
    [/^Salio de bodega (MTY|CDMX) con destino a (MTY|CDMX)/, (m) => `Salió de bodega ${m[1]} con destino a ${m[2]}`],
    [/^Llego a bodega (MTY|CDMX)/, (m) => `Llegó a bodega ${m[1]}`],
    // Textos de versiones anteriores del sistema
    [/Llego a bodega de Ciudad de Mexico/, () => 'Llegó a bodega CDMX'],
    [/Llego a bodega de Monterrey/, () => 'Llegó a bodega MTY'],
    [/salio de Monterrey|hacia Ciudad de Mexico$/, () => 'Salió de bodega MTY con destino a CDMX'],
    [/salio de Ciudad de Mexico|hacia Monterrey$/, () => 'Salió de bodega CDMX con destino a MTY'],
  ];

  function textoEvento(desc, accion) {
    if (desc) {
      for (const [re, fn] of EVENTOS) {
        const m = desc.match(re);
        if (m) return fn(m);
      }
      return desc;
    }
    return accion === 'SALIDA' ? 'Salió de bodega' : 'Llegó a bodega';
  }

  function fmtFecha(f) {
    return new Date(f).toLocaleString('es-MX', {
      day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit',
    });
  }

  function mostrarError(texto) {
    $('resultado').style.display = 'none';
    $('cardHistorial').style.display = 'none';
    $('error').textContent = texto;
    $('error').style.display = 'block';
  }

  async function rastrear() {
    const numeroGuia = $('guia').value.trim().toUpperCase();
    if (!numeroGuia) return;
    $('error').style.display = 'none';
    $('btnBuscar').disabled = true;
    try {
      const res = await fetch('/api/publico/guias/' + encodeURIComponent(numeroGuia));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'No pudimos consultar tu guía, intenta más tarde.');

      const enBodega = data.estatus.startsWith('EN_BODEGA');
      $('resEstatus').textContent = (ETIQUETAS[data.estatus] || data.estatus) + ' - ' + data.numeroGuia;
      $('resEstatus').className = 'estatus-grande ' + (enBodega ? 'e-bodega' : 'e-transito');
      $('resMensaje').textContent = DETALLES[data.estatus] || data.mensaje;
      $('resActualizado').textContent = 'Última actualización: ' + fmtFecha(data.actualizado_en);
      $('resultado').style.display = 'block';

      $('historial').innerHTML = data.historial
        .map((ev) => `<li class="${ev.accion === 'SALIDA' ? 'e-salida' : 'e-llegada'}">
            <div class="desc">${textoEvento(ev.descripcion, ev.accion)}</div>
            <div class="fecha">${fmtFecha(ev.creado_en)}</div>
          </li>`)
        .join('');
      $('cardHistorial').style.display = data.historial.length ? 'block' : 'none';
      actualizarBotonWa(data.numeroGuia);
    } catch (e) {
      mostrarError(e.message);
    } finally {
      $('btnBuscar').disabled = false;
    }
  }

  $('guia').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') rastrear();
  });

  // Permite enlaces directos: /rastreo.html?guia=TAU-1001
  const param = new URLSearchParams(location.search).get('guia');
  if (param) {
    $('guia').value = param;
    rastrear();
  }
</script>
</body>
</html>
